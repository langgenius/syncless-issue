name: "⭐ Feature Request"
description: Propose a new feature or enhancement
labels:
  - enhancement
body:
  - type: checkboxes
    attributes:
      label: Self Checks
      description: "Please confirm the following before submitting :)"
      options:
        - label: I have searched for [existing issues](https://github.com/langgenius/syncless-issue/issues), including closed ones.
          required: true
        - label: I confirm that I am using English to submit this report (中文用户也请使用英语提交).
          required: true
        - label: "Please do not modify this template :) and fill in all the required fields."
          required: true

  - type: textarea
    attributes:
      label: "1. Is this request related to a problem you're experiencing? Tell us your story."
      placeholder: "Describe the specific scenario or problem clearly. For example: \"I was trying to use [feature] for [specific task], and [what happened]...\""
    validations:
      required: true

  - type: textarea
    attributes:
      label: "2. What is your proposed solution?"
      placeholder: Describe the behavior or feature you'd like to see. Be as specific as possible.
    validations:
      required: false

  - type: textarea
    attributes:
      label: "3. Additional context"
      placeholder: Any other information, mockups, screenshots, or links that would provide more clarity.
    validations:
      required: false

  - type: markdown
    attributes:
      value: Please limit one request per issue. Thank you! 🙏
